task: halluscore
# HalluScore: the first Arabic QA hallucination benchmark (arXiv:2605.17007;
# github.com/aishaalansari57/HalluScore). 621 curated QA rows vendored locally as halluscore.jsonl
# (the released xlsx has no HF mirror; its 17 precomputed model-response columns are dropped).
dataset_path: json
dataset_kwargs:
  data_files:
    test: HalluScore/halluscore.jsonl
test_split: test
output_type: generate_until
# Paper's unified zero-shot Arabic prompt (HalluScore run.py): answer realistically, briefly,
# without extra details -- discourages speculation so grading targets factuality, not style.
doc_to_text: "اجب على السؤال التالي باللغة العربية بشكل واقعي باختصار ودون تفاصيل:\n\n{{question}}\n\nالجواب:"
doc_to_target: "{{answer}}"
# Free-form Arabic factuality. The metric below is the AUTOMATED baseline (Arabic-normalized
# cover_match). The real score comes from the LLM judge (judge_vllm.py): the ternary grader
# (judge_prompts.factuality_prompt -> SimpleQAJudgeOutputSchema, grade A/B/C) adds
# acc / correct / incorrect / not_attempted / correct_given_attempted / f_score under separate keys.
metric_list:
  - metric: !function utils.halluscore_automated_metrics
    aggregation: mean
    higher_is_better: true
generation_kwargs:
  until:
    - <end_of_turn>
    - <eos>
    - </s>
    - <|end_of_text|>
    - <|eot_id|>
    - <|endoftext|>
    - <|im_end|>
  do_sample: false
metadata:
  version: 1.0
