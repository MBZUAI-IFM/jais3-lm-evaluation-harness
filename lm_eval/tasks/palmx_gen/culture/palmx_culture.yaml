task: palmx_culture_gen
dataset_path: UBC-NLP/palmx_2025_subtask1_culture
test_split: test

output_type: generate_until

process_docs: !function utils.add_options_with_text
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
target_delimiter: " "

metric_list:
  - metric: !function utils.exact_match_normalized_label
    aggregation: mean
    higher_is_better: true
num_fewshot: 0

metadata:
  version: 1.0
generation_kwargs:
  until:
    - <end_of_turn>
    - <eos>
    - </s>
    - <|end_of_text|>
    - <|eot_id|>
    - <|endoftext|>
  do_sample: false
filter_list:
  - name: extract_answer
    filter:
      - function: custom
        filter_fn: !function utils.extract_bracketed_label
