task: islamic_qa_palmX2025_2_gen
dataset_path: json
dataset_name:
dataset_kwargs:
  data_files:
    test: islamic_qa_benchmarks/PalmX2025/subtask_2.json
test_split: test

output_type: generate_until

doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
process_docs: !function utils.add_options_with_text

metric_list:
  - metric: !function utils.exact_match_normalized_label
    aggregation: mean
    higher_is_better: true
filter_list:
  - name: extract_answer
    filter:
      - function: custom
        filter_fn: !function utils.extract_bracketed_label

metadata:
  version: 1.0
generation_kwargs:
  until:
    - <end_of_turn>
    - <eos>
    - </s>
    - <|end_of_text|>
    - <|eot_id|>
    - <|endoftext|>
    - <|im_end|>
  do_sample: false
