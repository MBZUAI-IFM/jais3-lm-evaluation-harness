task: AraDiCE_palestine_cultural_gen
dataset_path: QCRI/AraDiCE-Culture
dataset_name: Palestine
training_split:
validation_split:
test_split: test
output_type: generate_until
process_docs: !function utils.process_docs
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
should_decontaminate: true
doc_to_decontamination_query: Question
metric_list:
  - metric: !function utils.exact_match_normalized_label
    aggregation: mean
    higher_is_better: true
filter_list:
  - name: extract_answer
    filter:
      - function: custom
        filter_fn: !function utils.extract_bracketed_label
metadata:
  version: 1.0
generation_kwargs:
  until:
    - <end_of_turn>
    - <eos>
    - </s>
    - <|end_of_text|>
    - <|eot_id|>
    - <|endoftext|>
    - <|im_end|>
  do_sample: false
