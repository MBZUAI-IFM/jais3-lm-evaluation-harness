task: palmx_culture
dataset_path: UBC-NLP/palmx_2025_subtask1_culture
test_split: test

output_type: multiple_choice

doc_to_text: |
  أجب عن السؤال التالي باختيار الإجابة الصحيحة من بين الخيارات A أو B أو C أو D. الرجاء الرد بالحرف الصحيح فقط دون أي شرح أو معلومات إضافية.
  السؤال: {{question}}
  A. {{A}}
  B. {{B}}
  C. {{C}}
  D. {{D}}
  الإجابة:
doc_to_choice: !function utils.doc_to_choice
doc_to_target: !function utils.doc_to_target
target_delimiter: " "

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true

num_fewshot: 0

metadata:
  version: 1.0
