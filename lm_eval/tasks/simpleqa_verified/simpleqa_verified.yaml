task: simpleqa_verified
dataset_path: google/simpleqa-verified
test_split: eval
output_type: generate_until
doc_to_text: "{{problem}}"
doc_to_target: "{{answer}}"
# Free-form short-form factuality benchmark. The metric below is the AUTOMATED baseline
# (strict exact_match + cover_match). The real score comes from the LLM judge (judge_vllm.py):
# the ternary grader (judge_prompts.factuality_prompt -> SimpleQAJudgeOutputSchema, grade A/B/C)
# adds acc / correct / incorrect / not_attempted / correct_given_attempted / f_score under
# separate keys, so both the automated and judge metrics end up in results["simpleqa_verified"].
metric_list:
  - metric: !function utils.simpleqa_automated_metrics
    aggregation: mean
    higher_is_better: true
generation_kwargs:
  until:
    - <end_of_turn>
    - <eos>
    - </s>
    - <|end_of_text|>
    - <|eot_id|>
    - <|endoftext|>
    - <|im_end|>
  do_sample: false
metadata:
  version: 1.0
